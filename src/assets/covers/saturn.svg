    <ellipse rx="230" ry="62" fill="none" stroke="#e9d5ff" stroke-opacity="0.55" stroke-width="10" transform="rotate(-18)"/>
    <ellipse rx="200" ry="50" fill="none" stroke="#67e8f9" stroke-opacity="0.35" stroke-width="4" transform="rotate(-18)"/>
  </g>
  <g font-family="'Space Grotesk', 'Segoe UI', sans-serif">
