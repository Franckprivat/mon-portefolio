    <circle cx="960" cy="640" r="2"/><circle cx="1080" cy="140" r="1.5"/><circle cx="240" cy="380" r="1.5"/>
    <circle cx="700" cy="680" r="1.5"/><circle cx="880" cy="80" r="2"/><circle cx="80" cy="560" r="1.5"/>
  </g>
  <g transform="translate(860 320)">
